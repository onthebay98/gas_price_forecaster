name: Log AAA Gas Price Daily

permissions:
  contents: write   # allow pushing to the repo

concurrency:
  group: log-aaa-gas-price
  cancel-in-progress: true

on:
  schedule:
    - cron: "0 14 * * *"   # daily at 14:00 UTC (~9am ET)
  workflow_dispatch:

jobs:
  run_logger:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          persist-credentials: true
          ref: main

      - name: Sync to origin/main
        run: |
          git fetch origin
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run AAA Logger
        run: |
          python -m src.pipelines.log_aaa

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/aaa_daily.csv

          # Exit cleanly if nothing changed
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update AAA gas price"

          # 1. Fetch the latest from origin/main
          git fetch origin main

          # 2. ATTEMPT REBASE: Use '|| true' to prevent the step from failing 
          #    immediately if a conflict occurs, allowing us to resolve it.
          if git pull --rebase --autostash origin main || true; then
              
              # 3. CONFLICT CHECK AND RESOLUTION
              # Check if the rebase command above actually resulted in a conflict
              if git status | grep 'rebase in progress'; then
                  echo "Rebase conflict detected. Manually resolving..."
                  
                  # Since we only modified the CSV, we keep the staged version ('ours')
                  git checkout --ours data/aaa_daily.csv
                  git add data/aaa_daily.csv
                  
                  # Finish the rebase
                  git rebase --continue
                  echo "Conflict resolved and rebase completed."
              else
                  echo "Rebase successful or no conflict occurred."
              fi
          
              # 4. Push safely. This push should now succeed because the rebase completed.
              git push --force-with-lease origin HEAD:main

          # The outer if/then structure is primarily for readability here.
          # The key is that the rebase attempt is now non-fatal due to '|| true'.
name: Log AAA Gas Price Daily

permissions:
  contents: write   # allow pushing

on:
  schedule:
    - cron: "0 14 * * *"   # daily at 14:00 UTC (~9am ET)
  workflow_dispatch:        # manual trigger

jobs:
  run_logger:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0      # IMPORTANT: so we can rebase

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run AAA Logger
        run: |
          python -m src.pipelines.log_aaa

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # Rebase onto latest origin/main to avoid non-fast-forward errors
          git pull --rebase origin main || true

          git add data/aaa_daily.csv
          git commit -m "Update AAA gas price" || echo "No changes to commit"

          git push origin HEAD:main

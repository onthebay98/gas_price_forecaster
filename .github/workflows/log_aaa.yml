name: Log AAA Gas Price Daily

permissions:
  contents: write   # allow pushing to the repo

concurrency:
  group: log-aaa-gas-price
  cancel-in-progress: true

on:
  schedule:
    # Use the 'branches' key to explicitly define which branch the cron job
    # should track. This guarantees it uses the latest YAML from 'main'.
    - cron: "0 14 * * *"
      branches:
        - main
  workflow_dispatch:

jobs:
  run_logger:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          persist-credentials: true
          ref: main

      - name: Sync to origin/main
        run: |
          git fetch origin
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run AAA Logger
        run: |
          python -m src.pipelines.log_aaa

      # 1. Commit Local Changes
      - name: Commit local data file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/aaa_daily.csv
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update AAA gas price"
        # If no changes were made, this step will exit 0 and stop the job gracefully.

      # 2. Attempt Rebase (Tolerance for Failure)
      - name: Fetch and attempt rebase
        run: |
          git fetch origin main
          # This command is expected to fail (exit 1) if there's a conflict.
          git pull --rebase --autostash origin main
        # CRITICAL: Allow this step to fail if there's a conflict
        continue-on-error: true

      # 3. Resolve Conflict (Only runs if a conflict occurred in step 2)
      - name: Resolve conflict if needed
        # We check if Git is currently in a 'rebase in progress' state.
        if: steps['Attempt Rebase'].outcome == 'failure' && success()
        run: |
          echo "Conflict detected. Resolving..."
          # Keep the local version ('ours') of the CSV file
          git checkout --ours data/aaa_daily.csv
          git add data/aaa_daily.csv
          # Finish the rebase
          git rebase --continue
          echo "Conflict resolved."

      # 4. Push Changes
      - name: Push new commit
        run: |
          # Push safely after rebase (successful or resolved)
          git push --force-with-lease origin HEAD:main
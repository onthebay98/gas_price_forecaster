name: Log AAA Gas Price Daily

permissions:
  contents: write   # <-- this is key so the job can push commits

on:
  schedule:
    - cron: "0 14 * * *"   # runs every day at 14:00 UTC (~9am ET)
  workflow_dispatch:

jobs:
  run_logger:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run AAA Logger
        run: |
          python -m src.pipelines.log_aaa

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/aaa_daily.csv
          git commit -m "Update AAA gas price" || echo "No changes to commit"
          git push

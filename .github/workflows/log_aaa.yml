name: Log AAA Gas Price Daily

permissions:
  contents: write   # allow pushing to the repo

on:
  schedule:
    - cron: "0 14 * * *"   # daily at 14:00 UTC (~9am ET)
  workflow_dispatch:

jobs:
  run_logger:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          persist-credentials: true
          ref: main

      - name: Sync to origin/main
        run: |
          git fetch origin
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run AAA Logger
        run: |
          python -m src.pipelines.log_aaa

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/aaa_daily.csv

          # Exit cleanly if nothing changed
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update AAA gas price"

          # Get latest main and rebase properly (your previous line was malformed)
          git fetch origin main
          git rebase --autostash origin/main || {
            echo "Rebase failed, aborting";
            git rebase --abort || true;
            exit 1;
          }

          # Push safely
          git push --force-with-lease origin HEAD:main

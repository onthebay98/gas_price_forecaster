name: Emergency Cancel (Gas)

on:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: gas-emergency-cancel
  cancel-in-progress: false

jobs:
  cancel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cancel all gas maker orders
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}
        run: |
          echo "EMERGENCY CANCEL — cancelling all open gas orders"
          python -m src.cli_maker_submit --cancel-all

      - name: List remaining orders (verification)
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}
        run: |
          python -m src.cli_maker_submit --list-open
